version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mangavault_db
    environment:
      POSTGRES_USER: mangavault
      POSTGRES_PASSWORD: mangavault_password
      POSTGRES_DB: mangavault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mangavault"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mangavault_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mangavault_api
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://mangavault:mangavault_password@postgres:5432/mangavault
      REDIS_URL: redis://redis:6379
      JWT_SECRET: mangavault_secret_key_change_in_production
      MANGA_FOLDERS: /manga/library
      AUTO_SCAN_ON_STARTUP: "true"
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - manga_storage:/app/storage/manga
      - C:/Users/fedec/OneDrive/Escritorio/Manga:/manga/library:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mangavault_web
    environment:
      VITE_API_URL: http://backend:3001/api
      VITE_WS_URL: ws://backend:3001
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  redis_data:
  manga_storage: